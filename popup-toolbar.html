<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Popup Toolbar</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: #f8fafc;
        color: #0f172a;
        overflow: hidden;
      }
      body {
        height: 100vh;
        border-bottom: 1px solid rgba(15, 23, 42, 0.08);
      }
      .popup-toolbar {
        height: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        box-sizing: border-box;
      }
      .popup-toolbar__url {
        flex: 1 1 auto;
        min-width: 0;
        padding: 7px 10px;
        border-radius: 8px;
        background: #ffffff;
        border: 1px solid rgba(15, 23, 42, 0.12);
        font-size: 12px;
        line-height: 1.3;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        user-select: text;
      }
      .popup-toolbar__button {
        flex: 0 0 auto;
        border: 0;
        border-radius: 8px;
        padding: 8px 12px;
        background: #111827;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
      }
      .popup-toolbar__button:hover {
        background: #1f2937;
      }
      .popup-toolbar__button:disabled {
        cursor: default;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <div class="popup-toolbar">
      <div class="popup-toolbar__url" id="popup-url" title="Loading...">Loading...</div>
      <button class="popup-toolbar__button" id="open-browser" type="button" disabled>Open in Browser</button>
    </div>
    <script>
      const { ipcRenderer, shell } = require('electron')

      const state = { url: '' }
      const urlNode = document.getElementById('popup-url')
      const openButton = document.getElementById('open-browser')

      const render = () => {
        const value = state.url || 'Loading...'
        urlNode.textContent = value
        urlNode.title = value
        openButton.disabled = !state.url
      }

      ipcRenderer.on('pinokio:popup-shell-state', (_event, payload = {}) => {
        state.url = typeof payload.url === 'string' ? payload.url : ''
        render()
      })

      openButton.addEventListener('click', () => {
        if (!state.url) {
          return
        }
        shell.openExternal(state.url).catch(() => {})
      })

      render()
    </script>
  </body>
</html>
